<!DOCTYPE html>
<html lang="et">
<head>

    <title>Tere, UrbanStyle!</title>

            max-width: 600px;
            margin: 50px auto;
            text-align: center;
            background-color: #f5f5f5;
            color: #1A1A2E;
        }
        h1 { color: #009B8D; }

            background: white;
            padding: 30px;

        }
        .badge {
            display: inline-block;
            background: #009B8D;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Tere, UrbanStyle!</h1>
    <div class="card">
        <h2>Sirli Rebane</h2>
        <p class="badge">Andmeanalüütik -- Nädal 0</p>
        <p>Minu esimene samm DACA programmis.</p>
        <p>Tööriistad seadistatud. Valmis alustama!</p>
    </div>
</body>
</html>
